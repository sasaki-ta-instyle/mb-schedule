name: deploy-prod (ConoHa)

# 「本番にあげて」と Claude に指示されたとき、または手動で起動する。
# push やマージでは絶対に起動しない（workflow_dispatch のみ）。

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (default: main)"
        required: false
        default: "main"

concurrency:
  group: deploy-prod-${{ vars.CATEGORY }}-${{ vars.APP_NAME }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CATEGORY: ${{ vars.CATEGORY }}
      APP_NAME: ${{ vars.APP_NAME }}
      HEALTHCHECK_PATH: ${{ vars.HEALTHCHECK_PATH }}
      USE_DB: ${{ vars.USE_DB }}
      MIGRATE_CMD: ${{ vars.MIGRATE_CMD }}
      DEPLOY_BASE: /var/www/${{ vars.CATEGORY }}/${{ vars.APP_NAME }}
      SHARED_BASE: /var/www/_shared

    steps:
      - name: Validate inputs
        run: |
          set -euo pipefail
          : "${CATEGORY:?CATEGORY variable is required}"
          : "${APP_NAME:?APP_NAME variable is required}"
          if [[ ! "$CATEGORY" =~ ^(app|cpc|crhr)$ ]]; then
            echo "::error::CATEGORY must be one of app|cpc|crhr (got '$CATEGORY')"
            exit 1
          fi
          if [[ ! "$APP_NAME" =~ ^[a-z][a-z0-9-]*$ ]]; then
            echo "::error::APP_NAME must match /^[a-z][a-z0-9-]*$/ (got '$APP_NAME')"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build (Next.js standalone)
        run: pnpm build

      - name: Stage build artifacts
        run: |
          set -euo pipefail
          mkdir -p _deploy
          cp -r .next/standalone/. _deploy/
          mkdir -p _deploy/.next
          cp -r .next/static _deploy/.next/static
          if [ -d public ]; then cp -r public _deploy/public; fi

      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.CONOHA_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.CONOHA_PORT }} -H ${{ secrets.CONOHA_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Prepare release directory on server
        env:
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          ssh -p ${{ secrets.CONOHA_PORT }} ${{ secrets.CONOHA_USER }}@${{ secrets.CONOHA_HOST }} "
            set -euo pipefail
            mkdir -p ${DEPLOY_BASE}/releases/${SHA}
          "

      - name: Rsync to server
        env:
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -p ${{ secrets.CONOHA_PORT }}" \
            _deploy/ \
            ${{ secrets.CONOHA_USER }}@${{ secrets.CONOHA_HOST }}:${DEPLOY_BASE}/releases/${SHA}/

      - name: Copy ecosystem.config.cjs to release
        env:
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          scp -P ${{ secrets.CONOHA_PORT }} \
            ecosystem.config.cjs \
            ${{ secrets.CONOHA_USER }}@${{ secrets.CONOHA_HOST }}:${DEPLOY_BASE}/releases/${SHA}/ecosystem.config.cjs

      - name: Link env files
        env:
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          ssh -p ${{ secrets.CONOHA_PORT }} ${{ secrets.CONOHA_USER }}@${{ secrets.CONOHA_HOST }} "
            set -euo pipefail
            REL=${DEPLOY_BASE}/releases/${SHA}
            ln -sfn ${SHARED_BASE}/.env \$REL/.env.base
            ln -sfn ${SHARED_BASE}/apps/${CATEGORY}-${APP_NAME}.env \$REL/.env.app || true
          "

      - name: Run migrations (DB only, from runner)
        if: ${{ vars.USE_DB == 'true' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          MIGRATE="${MIGRATE_CMD:-pnpm migrate}"
          # 標準の standalone build にはマイグレーション用ツール (tsx 等) が含まれないため、
          # ランナー側で migrate を実行する。DATABASE_URL は repo secret から取得する想定。
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::DATABASE_URL secret is required when USE_DB=true"
            exit 1
          fi
          ${MIGRATE}

      - name: Atomic switch + reload
        id: switch
        env:
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          ssh -p ${{ secrets.CONOHA_PORT }} ${{ secrets.CONOHA_USER }}@${{ secrets.CONOHA_HOST }} "
            set -euo pipefail
            cd ${DEPLOY_BASE}
            if [ -L current ]; then readlink current > .previous_release; fi
            ln -sfn releases/${SHA} current.new
            mv -T current.new current
            cd current
            # N-2: 既存プロセスがあれば reload（ダウンタイム無し）、無ければ start。
            # ecosystem.config.cjs の script は /var/www/.../current/server.js を指していて
            # 'current' は今アトミック切替済みのため、reload で新リリースが取り込まれる。
            # 過去 pm2 reload が崩れた事例があったので、reload に失敗したら delete + start に倒す。
            if pm2 describe ${CATEGORY}-${APP_NAME} >/dev/null 2>&1; then
              pm2 reload ecosystem.config.cjs --update-env || {
                echo 'pm2 reload failed; falling back to delete+start'
                pm2 delete ${CATEGORY}-${APP_NAME} 2>/dev/null || true
                pm2 start ecosystem.config.cjs --update-env
              }
            else
              pm2 start ecosystem.config.cjs --update-env
            fi
            pm2 save
          "

      - name: Health check
        id: health
        run: |
          set -euo pipefail
          URL="https://${CATEGORY}.instyle.group${HEALTHCHECK_PATH:-/${APP_NAME}/}"
          echo "Checking $URL"
          # -L でリダイレクトを追跡し、最終ステータスが 2xx の場合のみ成功とする。
          # 旧実装は `curl -fsS` で 308 でも exit 0 になり、basePath 設定不備や
          # ポート競合で実際に 4xx を返していても気付けなかった。
          for i in 1 2 3 4 5; do
            CODE=$(curl -sSL -o /dev/null --max-time 15 -w "%{http_code}" "$URL" || echo "000")
            if [[ "$CODE" =~ ^2[0-9][0-9]$ ]]; then
              echo "Health check OK (attempt $i, final HTTP $CODE)"
              exit 0
            fi
            echo "Attempt $i: HTTP $CODE (need 2xx), retrying in 3s..."
            sleep 3
          done
          echo "::error::Health check failed for $URL (last HTTP $CODE)"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.switch.outcome == 'success'
        run: |
          set -euo pipefail
          ssh -p ${{ secrets.CONOHA_PORT }} ${{ secrets.CONOHA_USER }}@${{ secrets.CONOHA_HOST }} "
            set -euo pipefail
            cd ${DEPLOY_BASE}
            if [ -f .previous_release ]; then
              PREV=\$(cat .previous_release)
              ln -sfn \$PREV current.new
              mv -T current.new current
              cd current
              # forward デプロイ側と対称な delete + start で確実に新 ecosystem を読み込ませる
              pm2 delete ${CATEGORY}-${APP_NAME} 2>/dev/null || true
              pm2 start ecosystem.config.cjs --update-env
              pm2 save
              echo 'Rolled back to '\$PREV
            else
              echo '::warning::No previous release to roll back to'
            fi
          "

      - name: Cleanup old releases
        if: success()
        env:
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          ssh -p ${{ secrets.CONOHA_PORT }} ${{ secrets.CONOHA_USER }}@${{ secrets.CONOHA_HOST }} "
            set -euo pipefail
            cd ${DEPLOY_BASE}/releases
            ls -1t | tail -n +6 | xargs -I{} rm -rf -- {}
          "

      - name: Summary
        if: success()
        run: |
          URL="https://${CATEGORY}.instyle.group/${APP_NAME}/"
          echo "## Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- URL: $URL" >> $GITHUB_STEP_SUMMARY
          echo "- SHA: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- PM2: ${CATEGORY}-${APP_NAME}" >> $GITHUB_STEP_SUMMARY
